<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Name1 & Name2 — Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ============= SVG ARTWORK LIBRARY ============= -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<defs>

    <radialGradient id="peonyPink" cx="50%" cy="30%" r="75%">
        <stop offset="0%" stop-color="#fdeef0"/>
        <stop offset="100%" stop-color="#e2a3ae"/>
    </radialGradient>
    <radialGradient id="peonyPinkDeep" cx="50%" cy="30%" r="75%">
        <stop offset="0%" stop-color="#f0c3cb"/>
        <stop offset="100%" stop-color="#c9808d"/>
    </radialGradient>
    <radialGradient id="rosePeach" cx="50%" cy="30%" r="75%">
        <stop offset="0%" stop-color="#fbe7d4"/>
        <stop offset="100%" stop-color="#dba077"/>
    </radialGradient>
    <radialGradient id="rosePeachDeep" cx="50%" cy="30%" r="75%">
        <stop offset="0%" stop-color="#f1caa4"/>
        <stop offset="100%" stop-color="#c17f52"/>
    </radialGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#a9b98a"/>
        <stop offset="100%" stop-color="#6f7d52"/>
    </linearGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="0.6"/>
    </filter>

    <!-- ===== peony ===== -->
    <symbol id="art-peony" viewBox="0 0 160 160">
        <g filter="url(#soft)">
            <g fill="url(#peonyPink)">
                <ellipse cx="80" cy="32" rx="22" ry="30"/>
                <ellipse cx="80" cy="32" rx="22" ry="30" transform="rotate(51 80 80)"/>
                <ellipse cx="80" cy="32" rx="22" ry="30" transform="rotate(102 80 80)"/>
                <ellipse cx="80" cy="32" rx="22" ry="30" transform="rotate(153 80 80)"/>
                <ellipse cx="80" cy="32" rx="22" ry="30" transform="rotate(204 80 80)"/>
                <ellipse cx="80" cy="32" rx="22" ry="30" transform="rotate(255 80 80)"/>
                <ellipse cx="80" cy="32" rx="22" ry="30" transform="rotate(306 80 80)"/>
            </g>
            <g fill="url(#peonyPinkDeep)" opacity="0.9">
                <ellipse cx="80" cy="48" rx="15" ry="20"/>
                <ellipse cx="80" cy="48" rx="15" ry="20" transform="rotate(60 80 80)"/>
                <ellipse cx="80" cy="48" rx="15" ry="20" transform="rotate(120 80 80)"/>
                <ellipse cx="80" cy="48" rx="15" ry="20" transform="rotate(180 80 80)"/>
                <ellipse cx="80" cy="48" rx="15" ry="20" transform="rotate(240 80 80)"/>
                <ellipse cx="80" cy="48" rx="15" ry="20" transform="rotate(300 80 80)"/>
            </g>
            <circle cx="80" cy="80" r="11" fill="#fbf1e2"/>
            <circle cx="80" cy="80" r="4" fill="#c9a227"/>
        </g>
    </symbol>

    <!-- ===== rose (peach, spiral) ===== -->
    <symbol id="art-rose" viewBox="0 0 140 140">
        <g filter="url(#soft)">
            <g fill="url(#rosePeach)">
                <ellipse cx="70" cy="30" rx="17" ry="24"/>
                <ellipse cx="70" cy="30" rx="17" ry="24" transform="rotate(45 70 70)"/>
                <ellipse cx="70" cy="30" rx="17" ry="24" transform="rotate(90 70 70)"/>
                <ellipse cx="70" cy="30" rx="17" ry="24" transform="rotate(135 70 70)"/>
                <ellipse cx="70" cy="30" rx="17" ry="24" transform="rotate(180 70 70)"/>
                <ellipse cx="70" cy="30" rx="17" ry="24" transform="rotate(225 70 70)"/>
                <ellipse cx="70" cy="30" rx="17" ry="24" transform="rotate(270 70 70)"/>
                <ellipse cx="70" cy="30" rx="17" ry="24" transform="rotate(315 70 70)"/>
            </g>
            <g fill="url(#rosePeachDeep)" opacity="0.9">
                <ellipse cx="70" cy="46" rx="12" ry="16" transform="rotate(20 70 70)"/>
                <ellipse cx="70" cy="46" rx="12" ry="16" transform="rotate(90 70 70)"/>
                <ellipse cx="70" cy="46" rx="12" ry="16" transform="rotate(160 70 70)"/>
                <ellipse cx="70" cy="46" rx="12" ry="16" transform="rotate(230 70 70)"/>
                <ellipse cx="70" cy="46" rx="12" ry="16" transform="rotate(300 70 70)"/>
            </g>
            <circle cx="70" cy="70" r="7" fill="#f1caa4"/>
        </g>
    </symbol>

    <!-- ===== small blossom ===== -->
    <symbol id="art-blossom" viewBox="0 0 40 40">
        <g fill="#f3c3cf">
            <ellipse cx="20" cy="9" rx="6" ry="8"/>
            <ellipse cx="20" cy="9" rx="6" ry="8" transform="rotate(72 20 20)"/>
            <ellipse cx="20" cy="9" rx="6" ry="8" transform="rotate(144 20 20)"/>
            <ellipse cx="20" cy="9" rx="6" ry="8" transform="rotate(216 20 20)"/>
            <ellipse cx="20" cy="9" rx="6" ry="8" transform="rotate(288 20 20)"/>
        </g>
        <circle cx="20" cy="20" r="3" fill="#c9a227"/>
    </symbol>

    <!-- ===== leaf spray ===== -->
    <symbol id="art-leaf" viewBox="0 0 60 30">
        <path d="M2,26 C18,20 20,8 40,4" fill="none" stroke="url(#leafGrad)" stroke-width="2"/>
        <ellipse cx="16" cy="20" rx="9" ry="4.5" fill="url(#leafGrad)" transform="rotate(-30 16 20)"/>
        <ellipse cx="30" cy="11" rx="9" ry="4.5" fill="url(#leafGrad)" transform="rotate(-20 30 11)"/>
        <ellipse cx="42" cy="5" rx="7" ry="3.5" fill="url(#leafGrad)" transform="rotate(-10 42 5)"/>
    </symbol>

    <!-- ===== cherry blossom branch ===== -->
    <symbol id="art-branch" viewBox="0 0 220 230">
        <path d="M6,6 C40,32 34,66 60,86 C82,102 76,128 100,144 C118,156 114,178 134,192"
              fill="none" stroke="#8a6a45" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M46,66 C60,70 66,60 76,64" fill="none" stroke="#8a6a45" stroke-width="1.6"/>
        <path d="M84,112 C98,114 102,104 114,106" fill="none" stroke="#8a6a45" stroke-width="1.6"/>
        <use href="#art-blossom" x="0" y="0" width="46" height="46"/>
        <use href="#art-blossom" x="34" y="42" width="38" height="38"/>
        <use href="#art-blossom" x="64" y="80" width="34" height="34"/>
        <use href="#art-blossom" x="94" y="120" width="30" height="30"/>
        <use href="#art-blossom" x="118" y="156" width="34" height="34"/>
        <use href="#art-leaf" x="52" y="60" width="30" height="16" transform="rotate(30 52 60)"/>
        <use href="#art-leaf" x="90" y="100" width="26" height="14" transform="rotate(20 90 100)"/>
        <circle cx="30" cy="34" r="3" fill="#f6d7de" opacity="0.9"/>
        <circle cx="88" cy="98" r="2.6" fill="#f6d7de" opacity="0.9"/>
    </symbol>

    <!-- ===== bouquet cluster (large) ===== -->
    <symbol id="art-bouquet-lg" viewBox="0 0 230 230">
        <use href="#art-leaf" x="0" y="130" width="90" height="46"/>
        <use href="#art-leaf" x="40" y="150" width="80" height="40" transform="rotate(-8 40 150)"/>
        <use href="#art-peony" x="4" y="90" width="100" height="100"/>
        <use href="#art-rose" x="70" y="130" width="90" height="90"/>
        <use href="#art-blossom" x="120" y="60" width="46" height="46"/>
        <use href="#art-blossom" x="140" y="150" width="40" height="40"/>
        <use href="#art-blossom" x="30" y="180" width="36" height="36"/>
        <use href="#art-leaf" x="110" y="170" width="60" height="30" transform="rotate(15 110 170)"/>
    </symbol>

    <!-- ===== bouquet cluster (small, paired with cage) ===== -->
    <symbol id="art-bouquet-sm" viewBox="0 0 200 200">
        <use href="#art-leaf" x="0" y="120" width="70" height="36"/>
        <use href="#art-rose" x="10" y="90" width="76" height="76"/>
        <use href="#art-blossom" x="70" y="150" width="36" height="36"/>
        <use href="#art-blossom" x="30" y="160" width="30" height="30"/>
        <use href="#art-leaf" x="50" y="150" width="46" height="24" transform="rotate(10 50 150)"/>
    </symbol>

    <!-- ===== thin gold corner scrollwork ===== -->
    <symbol id="art-corner" viewBox="0 0 100 100">
        <g fill="none" stroke="#b89355" stroke-width="1.3" stroke-linecap="round">
            <path d="M4,44 C4,20 20,4 44,4"/>
            <path d="M4,4 C4,4 8,18 20,20 C28,22 24,32 32,34"/>
            <circle cx="4" cy="4" r="2" fill="#b89355" stroke="none"/>
            <circle cx="32" cy="34" r="1.6" fill="#d9bd85" stroke="none"/>
        </g>
    </symbol>

    <!-- ===== vintage postage stamp ===== -->
    <symbol id="art-stamp" viewBox="0 0 80 100">
        <rect x="4" y="4" width="72" height="92" fill="#e7ddc0" stroke="#8a8a5c" stroke-width="1.4" stroke-dasharray="3 3"/>
        <rect x="12" y="12" width="56" height="76" fill="none" stroke="#8a8a5c" stroke-width="0.8"/>
        <use href="#art-blossom" x="20" y="24" width="40" height="40"/>
        <circle cx="40" cy="70" r="16" fill="none" stroke="#7a7a54" stroke-width="0.8" opacity="0.7"/>
        <line x1="24" y1="70" x2="56" y2="70" stroke="#7a7a54" stroke-width="0.6" opacity="0.6"/>
    </symbol>

    <!-- ===== birdcage ===== -->
    <symbol id="art-cage" viewBox="0 0 120 170">
        <g fill="none" stroke="#7d8a5c" stroke-width="1.6" stroke-linecap="round">
            <path d="M60,4 C42,12 32,26 32,40 L88,40 C88,26 78,12 60,4 Z"/>
            <circle cx="60" cy="4" r="3" fill="#7d8a5c" stroke="none"/>
            <path d="M32,40 L28,120 C28,134 42,142 60,142 C78,142 92,134 92,120 L88,40"/>
            <path d="M36,48 L32,120" opacity="0.85"/>
            <path d="M48,42 L42,124" opacity="0.85"/>
            <path d="M60,40 L58,128" opacity="0.85"/>
            <path d="M72,42 L78,124" opacity="0.85"/>
            <path d="M84,48 L88,120" opacity="0.85"/>
            <ellipse cx="60" cy="120" rx="32" ry="6"/>
            <ellipse cx="60" cy="142" rx="32" ry="7"/>
            <path d="M28,120 C28,120 22,128 28,134"/>
            <path d="M92,120 C92,120 98,128 92,134"/>
        </g>
        <path d="M60,142 L60,164" stroke="#7d8a5c" stroke-width="1.6" fill="none"/>
        <ellipse cx="60" cy="166" rx="14" ry="4" fill="none" stroke="#7d8a5c" stroke-width="1.2"/>
    </symbol>

    <!-- ===== flying bird silhouette ===== -->
    <symbol id="art-bird" viewBox="0 0 60 40">
        <path d="M2,24 C12,10 20,10 30,20 C40,10 48,10 58,24 C46,20 40,24 30,16 C20,24 14,20 2,24 Z" fill="#a85661"/>
    </symbol>

    <!-- ===== small floral flourish divider ===== -->
    <symbol id="art-mini-vine" viewBox="0 0 160 40">
        <path d="M4,20 C40,4 40,36 78,20 C116,4 116,36 156,20" fill="none" stroke="#7d8a5c" stroke-width="1.3"/>
        <use href="#art-blossom" x="62" y="4" width="32" height="32"/>
        <use href="#art-leaf" x="10" y="10" width="24" height="14"/>
        <use href="#art-leaf" x="124" y="10" width="24" height="14" transform="scale(-1,1) translate(-296,0)"/>
    </symbol>

    <!-- paper grain -->
    <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
        <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.36  0 0 0 0 0.29  0 0 0 0 0.2  0 0 0 0.05 0"/>
    </filter>

</defs>
</svg>

<div id="container">

    <!-- ENVELOPE -->
    <div class="envelope-wrap" onclick="openInvite()">
        <div class="envelope">
            <svg class="corner-deco ec-tl" viewBox="0 0 100 100"><use href="#art-corner"/></svg>
            <svg class="corner-deco ec-tr" viewBox="0 0 100 100"><use href="#art-corner"/></svg>
            <svg class="corner-deco ec-bl" viewBox="0 0 100 100"><use href="#art-corner"/></svg>
            <svg class="corner-deco ec-br" viewBox="0 0 100 100"><use href="#art-corner"/></svg>
            <div class="seal">❀</div>
        </div>
        <div class="tap-hint">Tap to open</div>
    </div>

    <!-- INVITATION CARD -->
    <div class="card">

        <svg class="texture-overlay" width="100%" height="100%"><rect width="100%" height="100%" filter="url(#grain)"/></svg>

        <svg class="corner tl" viewBox="0 0 100 100"><use href="#art-corner"/></svg>
        <svg class="corner tr" viewBox="0 0 100 100"><use href="#art-corner"/></svg>
        <svg class="corner bl" viewBox="0 0 100 100"><use href="#art-corner"/></svg>
        <svg class="corner br" viewBox="0 0 100 100"><use href="#art-corner"/></svg>

        <svg class="branch tl" viewBox="0 0 220 230"><use href="#art-branch"/></svg>
        <svg class="branch tr" viewBox="0 0 220 230"><use href="#art-branch"/></svg>
        <svg class="stamp" viewBox="0 0 80 100"><use href="#art-stamp"/></svg>

        <svg class="bouquet bl" viewBox="0 0 230 230"><use href="#art-bouquet-lg"/></svg>
        <svg class="bouquet br" viewBox="0 0 200 200"><use href="#art-bouquet-sm"/></svg>
        <svg style="position:absolute; bottom:6px; right:14px; width:70px; z-index:2;" viewBox="0 0 120 170"><use href="#art-cage"/></svg>
        <svg class="bird-fly" viewBox="0 0 60 40"><use href="#art-bird"/></svg>

        <div class="content">
            <div class="arch-frame">
                <div class="inner">
                    <div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
                </div>
            </div>

            <div class="intro">Together with their families</div>

            <div class="names-row">
                <div class="name">Name1</div>
            </div>
            <div class="names-row" style="margin-top:-14px;">
                <span class="and">and</span>
            </div>
            <div class="names-row" style="margin-top:-14px;">
                <div class="name">Name2</div>
            </div>

            <div class="invite-line">Joyfully invite you to<br>celebrate their wedding</div>

            <div class="date-row">
                <div class="label">Saturday</div>
                <div class="divider-line"></div>
                <div>
                    <div class="big">April</div>
                    <div class="day-num">7</div>
                    <div class="big">2028</div>
                </div>
                <div class="divider-line"></div>
                <div class="label">At 3<br>o'clock</div>
            </div>

            <svg class="mini-vine" viewBox="0 0 160 40"><use href="#art-mini-vine"/></svg>

            <div class="venue">The Garden, Cherry Blossom</div>
            <div class="reception">Reception to follow</div>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
